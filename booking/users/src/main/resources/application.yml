spring:
    application:
        name: users-service
    datasource:
        url: jdbc:postgresql://localhost:5440/users
        username: user_service
        password: secret
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
server:
    port: 8181
