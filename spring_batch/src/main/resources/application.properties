# --- Database Configuration ---
spring.datasource.url=jdbc:postgresql://localhost:5434/test_spring_batch
spring.datasource.username=postgres
spring.datasource.password=example
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Custom AWS Configuration ---
# Prefix your custom properties to avoid collisions.
# The `AwsConfig` bean will read these explicitly.
aws.s3.region=ap-southeast-1
# For local development, you might store credentials here.
# For production, it's recommended to use IAM roles or environment variables.
aws.s3.credentials.access-key=YOUR_ACCESS_KEY
aws.s3.credentials.secret-key=YOUR_SECRET_KEY

# --- Spring Batch Configuration ---
spring.batch.job.enabled=true
spring.batch.jdbc.initialize-schema=always
logging.level.org.springframework.batch=INFO
#Example: run every 1 minutes
batch.job.order.schedule=0 0/1 * * * ?

